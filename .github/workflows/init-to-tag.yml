name: Init Fork to Specific Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '上游 tag 版本 (例如 7.5.12)'
        required: true
        default: '7.5.12'

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork's main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Backup current workflows directory
        run: |
          mkdir -p /tmp/backup_workflows
          if [ -d .github/workflows ]; then
            cp -r .github/workflows /tmp/backup_workflows/
            echo "Workflows backed up"
          else
            echo "No workflows directory to backup"
          fi

      - name: Add upstream remote and fetch tags
        run: |
          git remote add upstream https://github.com/IntellectualSites/PlotSquared.git
          git fetch upstream --tags

      - name: Reset to specified tag (preserve workflows)
        run: |
          TAG="${{ github.event.inputs.tag }}"
          
          # 检查 tag 是否存在
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Error: Tag '$TAG' not found in upstream repository."
            exit 1
          fi
          
          # 强制重置到该 tag
          git reset --hard "$TAG"
          
          # 恢复备份的工作流目录
          if [ -d /tmp/backup_workflows/workflows ]; then
            # 确保 .github 目录存在
            mkdir -p .github
            rm -rf .github/workflows
            cp -r /tmp/backup_workflows/workflows .github/workflows/
            git add .github/workflows/
          else
            echo "No workflows to restore"
          fi
          
          # 创建/更新记录文件
          echo "$TAG" > last_release.txt
          echo "$TAG" > UPSTREAM_TAG
          git add last_release.txt UPSTREAM_TAG
          
          # 提交并强制推送
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Init to tag $TAG (preserved workflows)"
          git push origin main --force